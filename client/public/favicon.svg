<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Rich deep premium gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  <!-- Sleek background -->
  <rect width="128" height="128" rx="36" fill="url(#bgGrad)" />
  
  <!-- Interlocking connection links representing S (Skill) and L (Link) -->
  <path d="M36 40 C36 28, 48 24, 64 24 C80 24, 92 28, 92 40 C92 52, 36 60, 36 72 C36 84, 48 88, 64 88 C80 88, 92 84, 92 72" fill="none" stroke="url(#logoGrad)" stroke-width="14" stroke-linecap="round" />
  
  <!-- Connecting Horizontal Bridge representing collaboration -->
  <path d="M48 56 L80 56" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
  
  <!-- Core Connection Node -->
  <circle cx="64" cy="56" r="12" fill="#ffffff" />
  <circle cx="64" cy="56" r="6" fill="#4f46e5" />
</svg>