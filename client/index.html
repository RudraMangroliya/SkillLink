<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="24x24" href="/favicon-24x24.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512x512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups" />
    
    <!-- Primary SEO Metadata -->
    <title>SkillLink | AI-Powered Professional Networking & Job Matching</title>
    <meta name="description" content="SkillLink is an AI-powered professional networking and career platform. Connect with mentors, discover AI-matched jobs, join collaborative groups, and build your digital portfolio." />
    <meta name="keywords" content="professional network, AI job matching, career platform, mentorship, portfolio builder, job board, developer network, professional collaboration" />
    <meta name="author" content="SkillLink Inc." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://skilllink-mr.online" />

    <!-- Theme and UI Preferences -->
    <meta name="theme-color" content="#4f46e5" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph / Facebook Social Sharing Card -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SkillLink" />
    <meta property="og:title" content="SkillLink | AI-Powered Professional Networking & Job Matching" />
    <meta property="og:description" content="Connect with mentors, find AI-matched job opportunities, and build stunning portfolios on the premier professional network." />
    <meta property="og:image" content="https://skilllink-mr.online/og-image.png" />
    <meta property="og:logo" content="https://skilllink-mr.online/favicon-512x512.png" />
    <meta property="og:url" content="https://skilllink-mr.online" />

    <!-- Twitter Social Sharing Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkillLink | AI-Powered Professional Networking & Job Matching" />
    <meta name="twitter:description" content="Connect with mentors, find AI-matched job opportunities, and build stunning portfolios on the premier professional network." />
    <meta name="twitter:image" content="https://skilllink-mr.online/og-image.png" />

    <!-- JSON-LD Structured Data Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://skilllink-mr.online/#website",
            "url": "https://skilllink-mr.online",
            "name": "SkillLink",
            "description": "AI-powered professional networking and career platform.",
            "potentialAction": [
              {
                "@type": "SearchAction",
                "target": {
                  "@type": "EntryPoint",
                  "urlTemplate": "https://skilllink-mr.online/explore?q={search_term_string}"
                },
                "query-input": "required name=search_term_string"
              }
            ],
            "inLanguage": "en-US"
          },
          {
            "@type": "Organization",
            "@id": "https://skilllink-mr.online/#organization",
            "name": "SkillLink",
            "url": "https://skilllink-mr.online",
            "logo": {
              "@type": "ImageObject",
              "@id": "https://skilllink-mr.online/#logo",
              "url": "https://skilllink-mr.online/favicon-512x512.png",
              "contentUrl": "https://skilllink-mr.online/favicon-512x512.png",
              "width": "512",
              "height": "512",
              "caption": "SkillLink Logo"
            },
            "image": {
              "@id": "https://skilllink-mr.online/#logo"
            }
          }
        ]
      }
    </script>
  </head>
  <body class="min-w-[200px] overflow-x-hidden bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-white transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
